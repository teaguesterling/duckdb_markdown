#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-next-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: markdown
      vcpkg_commit: bffcbb75f71553824aa948a7e7b4f798662a6fa7
      vcpkg_url: https://github.com/Microsoft/vcpkg.git

  duckdb-stable-build:
    name: Build extension binaries
    # Stable: duckdb v1.5.3 (current stable release). The pre-`main` API
    # cliff (UnaryExecutor::Execute / VectorStringBuffer::SetValue alias
    # trap / DataChunk::SetCardinality propagation / FlatVector const-split)
    # is the same on v1.4.x and v1.5.x; see docs/DUCKDB_API_MIGRATION.md.
    # extension-ci-tools' v1.5.2 branch is the newest tagged for v1.5.x;
    # it compiles against duckdb v1.5.3 fine.
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.2
    with:
      duckdb_version: v1.5.3
      ci_tools_version: v1.5.2
      extension_name: markdown
      # Pin to vcpkg commit with verified cmark-gfm support (tested 2025-01-08)
      vcpkg_commit: bffcbb75f71553824aa948a7e7b4f798662a6fa7
      vcpkg_url: https://github.com/Microsoft/vcpkg.git

  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@main
    with:
      duckdb_version: v1.5.3
      ci_tools_version: main
      extension_name: markdown
      format_checks: 'format'
